<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Treino — Daily Health</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2EA043">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --bg:#0D1117; --card:#161B22; --card2:#1C2128;
  --green:#2EA043; --accent:#F0A500; --red:#EF4444; --blue:#3B82F6; --purple:#A855F7;
  --text:#E6EDF3; --muted:#8B949E; --border:#30363D;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:14px;line-height:1.5;padding-bottom:80px;}

/* HEADER */
.header{background:linear-gradient(135deg,#0a1f0e,#0D1117);padding:16px 16px 12px;border-bottom:2px solid var(--green);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.header a{color:var(--muted);font-size:20px;text-decoration:none;}
.header h1{font-size:17px;font-weight:800;color:var(--green);letter-spacing:1px;flex:1;}
.header-streak{font-size:11px;color:var(--accent);font-weight:700;}

/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:99;}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);border:none;background:none;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid transparent;transition:.2s;}
.tab.active{color:var(--green);border-bottom-color:var(--green);}

/* SECTIONS */
.section{display:none;padding:12px 12px 20px;}
.section.active{display:block;}

/* WORKOUT GRID — Seleção */
.section-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:14px 0 8px;padding-left:2px;}
.workout-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.wk-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;cursor:pointer;transition:border-color .15s,transform .1s;text-align:left;}
.wk-card:active{transform:scale(.97);}
.wk-card.selected, .wk-card:hover{border-color:var(--green);}
.wk-letter{font-size:28px;font-weight:900;color:var(--green);line-height:1;}
.wk-name{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.3;}
.wk-count{font-size:10px;color:var(--border);margin-top:4px;}

/* BTN */
.btn{width:100%;padding:14px;border-radius:10px;border:none;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.5px;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-gray{background:var(--card2);color:var(--muted);border:1px solid var(--border);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ACTIVE WORKOUT */
.workout-header{background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:10px;border:1px solid var(--green);}
.workout-header-top{display:flex;justify-content:space-between;align-items:center;}
.workout-title{font-size:15px;font-weight:800;color:var(--green);}
.workout-timer{font-size:13px;color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums;}
.workout-progress{margin-top:8px;background:var(--border);border-radius:4px;height:4px;overflow:hidden;}
.workout-progress-bar{height:4px;background:var(--green);transition:width .3s;}

/* EXERCISE CARD */
.ex-card{background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;transition:border-color .2s;}
.ex-card.done{border-color:var(--green);opacity:.7;}
.ex-header{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.ex-num{width:24px;height:24px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--muted);flex-shrink:0;}
.ex-card.done .ex-num{background:var(--green);border-color:var(--green);color:#fff;}
.ex-name{flex:1;font-size:13px;font-weight:700;}
.ex-meta{font-size:10px;color:var(--muted);}
.ex-check{font-size:16px;}
.ex-body{padding:0 14px 12px;border-top:1px solid var(--border);}

/* SETS TABLE */
.sets-table{width:100%;border-collapse:collapse;margin-top:8px;}
.sets-table th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:4px 6px;text-align:center;background:var(--card2);}
.sets-table th:first-child{text-align:left;}
.sets-table td{padding:5px 6px;text-align:center;border-top:1px solid var(--border);}
.sets-table td:first-child{font-size:11px;color:var(--muted);text-align:left;font-weight:700;}
.set-input{width:60px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 6px;color:var(--text);font-size:13px;font-weight:700;text-align:center;}
.set-input:focus{outline:none;border-color:var(--green);}
.set-done-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;margin:0 auto;}
.set-done-btn.done{border-color:var(--green);background:var(--green);}
.set-done-btn:active{transform:scale(.9);}
.set-row.done td{opacity:.5;}

/* HISTORY */
.hist-card{background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.hist-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.hist-date{font-size:12px;font-weight:700;color:var(--text);}
.hist-label{font-size:11px;color:var(--green);font-weight:700;}
.hist-meta{font-size:11px;color:var(--muted);}
.hist-body{padding:8px 14px 12px;border-top:1px solid var(--border);}
.hist-ex{font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}
.hist-ex:last-child{border-bottom:none;}
.hist-ex-name{font-weight:700;color:var(--text);}
.hist-ex-sets{color:var(--muted);font-size:11px;margin-top:1px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
.empty-icon{font-size:40px;margin-bottom:8px;}

/* CHART */
.chart-select{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:10px;}
.chart-container{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:14px;overflow-x:auto;}
canvas{display:block;}

/* ALERT */
.alert{border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;}
.alert-green{background:#0a1f0e;border:1px solid var(--green);color:#a0e8b0;}
.alert-orange{background:#1a1000;border:1px solid var(--accent);color:#f5d78e;}

/* WARMUP */
.warmup-box{background:#0d1a2e;border:1px solid var(--blue);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#a0c8f5;}
.warmup-box strong{color:var(--blue);}
</style>
</head>
<body>

<div class="header">
  <a href="index.html">‹</a>
  <h1>💪 TREINO</h1>
  <span class="header-streak" id="streakBadge"></span>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('selecao')">🏋️ Iniciar</button>
  <button class="tab" onclick="showTab('historico')">📋 Histórico</button>
  <button class="tab" onclick="showTab('evolucao')">📈 Evolução</button>
</div>

<!-- ══ TAB: SELEÇÃO ══ -->
<div class="section active" id="tab-selecao">
  <div id="selectionView">
    <p class="section-title">📅 Escolha o treino de hoje</p>
    <div class="workout-grid" id="workoutGrid"></div>
    <button class="btn btn-green" id="startBtn" onclick="startWorkout()" disabled>Iniciar Treino</button>
  </div>
  <div id="activeView" style="display:none"></div>
</div>

<!-- ══ TAB: HISTÓRICO ══ -->
<div class="section" id="tab-historico">
  <p class="section-title">📋 Treinos realizados</p>
  <div id="histList"></div>
</div>

<!-- ══ TAB: EVOLUÇÃO ══ -->
<div class="section" id="tab-evolucao">
  <p class="section-title">📈 Evolução por exercício</p>
  <select class="chart-select" id="chartExSelect" onchange="renderChart()">
    <option value="">— selecione um exercício —</option>
  </select>
  <div class="chart-container">
    <canvas id="myChart" height="200"></canvas>
  </div>
  <div id="chartStats" style="margin-top:10px"></div>
</div>

<script>
// ══════════════════════════════════
// WORKOUT DATA
// ══════════════════════════════════
const WORKOUTS = {
  "A": {
    label: "TREINO A — PERNAS",
    warmup: ["Esteira leve 5 min", "Mobilidade de quadril 2x10"],
    exercises: [
      { name: "Agachamento Goblet (halter vertical)", sets: 4, reps: 10, weight: 10 },
      { name: "Búlgaro com halter (Split Squat)", sets: 4, reps: 8, weight: 16 },
      { name: "Leg Press 45 graus", sets: 4, reps: 8, weight: 100 },
      { name: "Cadeira Extensora", sets: 4, reps: 8, weight: 45 },
      { name: "Mesa Flexora Deitada", sets: 4, reps: 8, weight: 30 },
      { name: "Levantamento Terra Romano (halteres)", sets: 4, reps: 8, weight: 20 },
      { name: "Hip Thrust com halter (banco)", sets: 3, reps: 12, weight: 20 },
      { name: "Panturrilha em pé (step/máquina)", sets: 4, reps: 15, weight: 40 },
      { name: "Prancha nos antebraços", sets: 3, time: 40, weight: 0 },
    ]
  },
  "B": {
    label: "TREINO B — EMPURRAR",
    warmup: ["Bicicleta ergométrica 5 min", "Rotação de ombro com elástico 2x15"],
    exercises: [
      { name: "Supino com halteres (pegada neutra)", sets: 4, reps: 10, weight: 12 },
      { name: "Crucifixo com halteres no banco", sets: 3, reps: 12, weight: 8 },
      { name: "Crossover Polia Alta", sets: 3, reps: 10, weight: 0 },
      { name: "Peck Deck (máquina borboleta)", sets: 3, reps: 15, weight: 35 },
      { name: "Desenvolvimento com halteres (sentado)", sets: 3, reps: 10, weight: 10 },
      { name: "Elevação lateral com halteres", sets: 4, reps: 12, weight: 8 },
      { name: "Desenvolvimento Arnold (adaptado)", sets: 3, reps: 10, weight: 10 },
      { name: "Tríceps no pulley - corda (pegada neutra)", sets: 4, reps: 12, weight: 0 },
      { name: "Tríceps Francês sentado com barra W", sets: 3, reps: 12, weight: 10 },
      { name: "Tríceps Kickback com halter", sets: 3, reps: 12, weight: 6 },
    ]
  },
  "C": {
    label: "TREINO C — OMBROS + BRAÇOS + CORE",
    warmup: ["Bicicleta ergométrica leve 5 min", "Rotação de ombro com halter leve 2x15"],
    exercises: [
      { name: "Desenvolvimento com halteres (sentado)", sets: 4, reps: 10, weight: 10 },
      { name: "Elevação Lateral com halteres", sets: 4, reps: 12, weight: 8 },
      { name: "Elevação Frontal alternada", sets: 3, reps: 10, weight: 6 },
      { name: "Face Pull com cabo", sets: 4, reps: 15, weight: 0 },
      { name: "Rosca Direta Barra W (EZ)", sets: 3, reps: 12, weight: 10 },
      { name: "Tríceps no Pulley — corda (pegada neutra)", sets: 3, reps: 12, weight: 0 },
      { name: "Rosca Martelo com halteres", sets: 3, reps: 12, weight: 10 },
      { name: "Tríceps Testa com barra W (Skull Crusher)", sets: 3, reps: 12, weight: 8 },
      { name: "Rosca Inversa (barra EZ)", sets: 3, reps: 12, weight: 8 },
      { name: "Prancha nos antebraços", sets: 3, time: 40, weight: 0 },
      { name: "Abdominal bicicleta", sets: 3, reps: 20, weight: 0 },
    ]
  },
  "D": {
    label: "TREINO D — PUXAR",
    warmup: ["Elíptico leve 5 min", "Band Pull-Apart com elástico 2x20"],
    exercises: [
      { name: "Remada Unilateral com halter (banco)", sets: 4, reps: 10, weight: 16 },
      { name: "Remada Cavalinho com barra", sets: 3, reps: 10, weight: 30 },
      { name: "Remada Baixa no Cabo (triângulo neutro)", sets: 3, reps: 12, weight: 0 },
      { name: "Puxada na Polia - Pulldown (triângulo neutro)", sets: 4, reps: 10, weight: 0 },
      { name: "Puxada Alta com barra maior", sets: 3, reps: 10, weight: 0 },
      { name: "Face Pull com cabo", sets: 4, reps: 15, weight: 0 },
      { name: "Encolhimento de ombros com halteres", sets: 3, reps: 15, weight: 16 },
      { name: "Rosca Martelo com halteres", sets: 4, reps: 12, weight: 10 },
      { name: "Rosca Direta Barra W (EZ)", sets: 3, reps: 12, weight: 10 },
      { name: "Rosca Inversa (pegada pronada)", sets: 3, reps: 12, weight: 8 },
    ]
  },
  "E": {
    label: "TREINO E — FULL BODY + HIIT",
    warmup: ["Polichinelo 2x30s", "Agachamento corporal 2x15"],
    exercises: [
      { name: "Agachamento Goblet", sets: 3, reps: 15, weight: 10 },
      { name: "Remada no cabo (triângulo)", sets: 3, reps: 12, weight: 0 },
      { name: "Elevação lateral com halteres", sets: 3, reps: 12, weight: 8 },
      { name: "Cadeira Extensora", sets: 3, reps: 15, weight: 45 },
      { name: "Tríceps no cabo (corda)", sets: 3, reps: 12, weight: 0 },
      { name: "Rosca Martelo", sets: 3, reps: 12, weight: 10 },
      { name: "Prancha nos antebraços", sets: 3, time: 35, weight: 0 },
    ]
  },
  "F": {
    label: "TREINO F — CARDIO + CORE",
    warmup: [],
    exercises: [
      { name: "Prancha nos antebraços", sets: 3, time: 40, weight: 0 },
      { name: "Abdominal bicicleta", sets: 3, reps: 20, weight: 0 },
      { name: "Elevação de pernas deitado", sets: 3, reps: 15, weight: 0 },
      { name: "Abdominal oblíquo (lado)", sets: 3, reps: 15, weight: 0 },
      { name: "Superman (extensão lombar)", sets: 3, reps: 12, weight: 0 },
    ]
  }
};

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let selectedWorkout = null;
let activeSession = null;
let timerInterval = null;
let timerSeconds = 0;
const STORAGE_KEY = 'daily_health_sessions';

function getSessions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function saveSessions(sessions) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
}

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
function init() {
  renderWorkoutGrid();
  updateStreak();
  populateChartSelect();
}

function updateStreak() {
  const sessions = getSessions();
  if (!sessions.length) return;
  const today = new Date().toDateString();
  const last = new Date(sessions[sessions.length-1].date).toDateString();
  if (last === today) {
    document.getElementById('streakBadge').textContent = '✅ Treino feito hoje';
  }
}

function renderWorkoutGrid() {
  const grid = document.getElementById('workoutGrid');
  const sessions = getSessions();
  grid.innerHTML = Object.entries(WORKOUTS).map(([key, w]) => {
    const count = sessions.filter(s => s.workout === key).length;
    return `<div class="wk-card" id="wkcard-${key}" onclick="selectWorkout('${key}')">
      <div class="wk-letter">${key}</div>
      <div class="wk-name">${w.label.split('—')[1]?.trim() || w.label}</div>
      <div class="wk-count">${count > 0 ? count+'x realizado' : 'nunca feito'} · ${w.exercises.length} exerc.</div>
    </div>`;
  }).join('');
}

function selectWorkout(key) {
  selectedWorkout = key;
  document.querySelectorAll('.wk-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('wkcard-'+key).classList.add('selected');
  document.getElementById('startBtn').disabled = false;
}

// ══════════════════════════════════
// START WORKOUT
// ══════════════════════════════════
function startWorkout() {
  if (!selectedWorkout) return;
  const wk = WORKOUTS[selectedWorkout];

  // Build session object
  activeSession = {
    workout: selectedWorkout,
    label: wk.label,
    date: new Date().toISOString(),
    exercises: wk.exercises.map(ex => ({
      name: ex.name,
      targetSets: ex.sets,
      targetReps: ex.reps || null,
      targetTime: ex.time || null,
      sets: Array.from({length: ex.sets}, (_, i) => ({
        setNum: i+1,
        weight: ex.weight || 0,
        reps: ex.reps || 0,
        time: ex.time || 0,
        done: false
      }))
    })),
    completed: false
  };

  document.getElementById('selectionView').style.display = 'none';
  document.getElementById('activeView').style.display = 'block';
  renderActiveWorkout();
  startTimer();
}

function startTimer() {
  timerSeconds = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = Math.floor(timerSeconds/60).toString().padStart(2,'0');
    const s = (timerSeconds%60).toString().padStart(2,'0');
    const el = document.getElementById('timerDisplay');
    if (el) el.textContent = m+':'+s;
  }, 1000);
}

function renderActiveWorkout() {
  const wk = WORKOUTS[selectedWorkout];
  const total = activeSession.exercises.length;
  const done = activeSession.exercises.filter(e => e.sets.every(s => s.done)).length;
  const pct = Math.round(done/total*100);

  let warmupHtml = '';
  if (wk.warmup && wk.warmup.length) {
    warmupHtml = `<div class="warmup-box">
      <strong>🔥 Aquecimento:</strong> ${wk.warmup.join(' · ')}
    </div>`;
  }

  const exHtml = activeSession.exercises.map((ex, exIdx) => {
    const allDone = ex.sets.every(s => s.done);
    const hasTime = ex.targetTime !== null;

    const setsRows = ex.sets.map((set, setIdx) => `
      <tr class="set-row ${set.done ? 'done' : ''}" id="setrow-${exIdx}-${setIdx}">
        <td>Série ${set.setNum}</td>
        <td><input class="set-input" type="number" min="0" step="${hasTime ? 5 : 1}"
          value="${hasTime ? set.time : set.weight}"
          onchange="updateSet(${exIdx},${setIdx},'${hasTime ? 'time' : 'weight'}',this.value)"
          placeholder="${hasTime ? 's' : 'kg'}">
          <div style="font-size:9px;color:var(--muted);margin-top:2px">${hasTime ? 'seg' : 'kg'}</div>
        </td>
        ${!hasTime ? `<td><input class="set-input" type="number" min="0" step="1"
          value="${set.reps}"
          onchange="updateSet(${exIdx},${setIdx},'reps',this.value)"
          placeholder="reps">
          <div style="font-size:9px;color:var(--muted);margin-top:2px">reps</div>
        </td>` : '<td style="color:var(--muted);font-size:11px">—</td>'}
        <td>
          <button class="set-done-btn ${set.done ? 'done' : ''}"
            onclick="toggleSet(${exIdx},${setIdx})">
            ${set.done ? '✓' : ''}
          </button>
        </td>
      </tr>`).join('');

    return `<div class="ex-card ${allDone ? 'done' : ''}" id="excard-${exIdx}">
      <div class="ex-header" onclick="toggleExBody(${exIdx})">
        <div class="ex-num" id="exnum-${exIdx}">${allDone ? '✓' : exIdx+1}</div>
        <div style="flex:1">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${ex.targetSets}x${ex.targetReps ? ex.targetReps+' reps' : ex.targetTime+'s'}</div>
        </div>
        <span class="ex-check">${allDone ? '✅' : '▸'}</span>
      </div>
      <div class="ex-body" id="exbody-${exIdx}" style="${allDone ? 'display:none' : ''}">
        <table class="sets-table">
          <thead><tr>
            <th>Série</th>
            <th>${hasTime ? 'Tempo' : 'Carga'}</th>
            ${!hasTime ? '<th>Reps</th>' : '<th></th>'}
            <th>✓</th>
          </tr></thead>
          <tbody>${setsRows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  const finishBtnHtml = done === total
    ? `<button class="btn btn-green" onclick="finishWorkout()" style="margin-top:12px">🏆 Concluir Treino</button>`
    : `<button class="btn btn-gray" onclick="finishWorkout()" style="margin-top:12px">Encerrar (${done}/${total} concluídos)</button>`;

  document.getElementById('activeView').innerHTML = `
    <div class="workout-header">
      <div class="workout-header-top">
        <div class="workout-title">${wk.label}</div>
        <div class="workout-timer" id="timerDisplay">00:00</div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${done}/${total} exercícios · ${pct}%</div>
      <div class="workout-progress"><div class="workout-progress-bar" style="width:${pct}%"></div></div>
    </div>
    ${warmupHtml}
    ${exHtml}
    ${finishBtnHtml}
    <button class="btn btn-gray" onclick="cancelWorkout()" style="margin-top:8px">Cancelar</button>
  `;
}

function toggleExBody(exIdx) {
  const body = document.getElementById('exbody-'+exIdx);
  body.style.display = body.style.display === 'none' ? '' : 'none';
}

function updateSet(exIdx, setIdx, field, val) {
  activeSession.exercises[exIdx].sets[setIdx][field] = parseFloat(val) || 0;
}

function toggleSet(exIdx, setIdx) {
  const set = activeSession.exercises[exIdx].sets[setIdx];
  set.done = !set.done;
  renderActiveWorkout();
  // re-start timer display sync
  const el = document.getElementById('timerDisplay');
  if (el) {
    const m = Math.floor(timerSeconds/60).toString().padStart(2,'0');
    const s = (timerSeconds%60).toString().padStart(2,'0');
    el.textContent = m+':'+s;
  }
}

function finishWorkout() {
  clearInterval(timerInterval);
  activeSession.completed = true;
  activeSession.duration = timerSeconds;

  const sessions = getSessions();
  sessions.push(activeSession);
  saveSessions(sessions);
  activeSession = null;

  document.getElementById('selectionView').style.display = 'block';
  document.getElementById('activeView').style.display = 'none';
  selectedWorkout = null;
  document.getElementById('startBtn').disabled = true;
  document.querySelectorAll('.wk-card').forEach(c => c.classList.remove('selected'));
  renderWorkoutGrid();
  updateStreak();
  populateChartSelect();

  // Show congrats
  const av = document.getElementById('activeView');
  document.getElementById('selectionView').insertAdjacentHTML('afterbegin',
    `<div class="alert alert-green" id="doneAlert">🏆 <strong>Treino concluído!</strong> Ótimo trabalho. Registrado no histórico.</div>`
  );
  setTimeout(() => { document.getElementById('doneAlert')?.remove(); }, 4000);
}

function cancelWorkout() {
  if (!confirm('Cancelar o treino atual?')) return;
  clearInterval(timerInterval);
  activeSession = null;
  document.getElementById('selectionView').style.display = 'block';
  document.getElementById('activeView').style.display = 'none';
}

// ══════════════════════════════════
// HISTORY
// ══════════════════════════════════
function renderHistory() {
  const sessions = getSessions();
  const el = document.getElementById('histList');
  if (!sessions.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>Nenhum treino registrado ainda.<br>Inicie seu primeiro treino!</div>`;
    return;
  }
  const reversed = [...sessions].reverse();
  el.innerHTML = reversed.map((s, i) => {
    const date = new Date(s.date);
    const dateStr = date.toLocaleDateString('pt-BR', {weekday:'short', day:'2-digit', month:'short'});
    const timeStr = date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    const duration = s.duration ? `${Math.floor(s.duration/60)}min` : '—';
    const totalVolume = s.exercises.reduce((acc, ex) =>
      acc + ex.sets.filter(st => st.done).reduce((a, st) => a + (st.weight * (st.reps || 1)), 0), 0
    );

    const exHtml = s.exercises.map(ex => {
      const doneSets = ex.sets.filter(st => st.done);
      if (!doneSets.length) return '';
      const setStr = doneSets.map(st =>
        ex.targetTime ? `${st.time}s` : `${st.weight}kg×${st.reps}`
      ).join(' · ');
      return `<div class="hist-ex">
        <div class="hist-ex-name">${ex.name}</div>
        <div class="hist-ex-sets">${setStr}</div>
      </div>`;
    }).filter(Boolean).join('');

    return `<div class="hist-card">
      <div class="hist-header" onclick="toggleHistBody('hist-${i}')">
        <div>
          <div class="hist-label">TREINO ${s.workout} — ${s.label.split('—')[1]?.trim()}</div>
          <div class="hist-date">${dateStr} às ${timeStr}</div>
        </div>
        <div style="text-align:right">
          <div class="hist-meta">${duration}</div>
          <div style="font-size:10px;color:var(--muted)">${totalVolume > 0 ? totalVolume+'kg vol.' : ''}</div>
        </div>
      </div>
      <div class="hist-body" id="hist-${i}" style="display:none">${exHtml}</div>
    </div>`;
  }).join('');
}

function toggleHistBody(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

// ══════════════════════════════════
// CHART / EVOLUTION
// ══════════════════════════════════
function populateChartSelect() {
  const sessions = getSessions();
  const exNames = new Set();
  sessions.forEach(s => s.exercises.forEach(ex => exNames.add(ex.name)));

  const sel = document.getElementById('chartExSelect');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— selecione um exercício —</option>' +
    [...exNames].sort().map(n => `<option value="${n}" ${n===prev?'selected':''}>${n}</option>`).join('');
}

function renderChart() {
  const exName = document.getElementById('chartExSelect').value;
  const canvas = document.getElementById('myChart');
  const statsEl = document.getElementById('chartStats');

  if (!exName) { canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); statsEl.innerHTML=''; return; }

  const sessions = getSessions();
  const points = [];

  sessions.forEach(s => {
    const ex = s.exercises.find(e => e.name === exName);
    if (!ex) return;
    const doneSets = ex.sets.filter(st => st.done);
    if (!doneSets.length) return;
    const maxWeight = Math.max(...doneSets.map(st => st.weight || 0));
    const totalVol = doneSets.reduce((a, st) => a + (st.weight || 0) * (st.reps || 1), 0);
    const date = new Date(s.date).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
    points.push({ date, maxWeight, totalVol });
  });

  if (!points.length) {
    statsEl.innerHTML = `<div class="alert alert-orange" style="font-size:11px">Nenhum dado registrado para este exercício ainda.</div>`;
    canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    return;
  }

  // Simple canvas chart
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth - 28;
  canvas.width = W;
  canvas.height = 200;
  ctx.clearRect(0,0,W,200);

  const values = points.map(p => p.maxWeight);
  const maxV = Math.max(...values, 1);
  const minV = Math.min(...values);
  const padL = 40, padR = 14, padT = 20, padB = 40;
  const chartW = W - padL - padR;
  const chartH = 200 - padT - padB;

  // Grid lines
  ctx.strokeStyle = '#30363D';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = padT + (chartH * i / 4);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W-padR, y); ctx.stroke();
    const val = maxV - (maxV-minV) * i/4;
    ctx.fillStyle = '#8B949E'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(0)+'kg', padL-4, y+4);
  }

  // Line
  const xStep = points.length > 1 ? chartW / (points.length-1) : chartW/2;
  ctx.strokeStyle = '#2EA043'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  points.forEach((p, i) => {
    const x = padL + (points.length > 1 ? i * xStep : chartW/2);
    const y = padT + chartH - chartH * ((p.maxWeight - minV) / (maxV - minV + 0.01));
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Points
  points.forEach((p, i) => {
    const x = padL + (points.length > 1 ? i * xStep : chartW/2);
    const y = padT + chartH - chartH * ((p.maxWeight - minV) / (maxV - minV + 0.01));
    ctx.fillStyle = '#2EA043';
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#E6EDF3'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(p.maxWeight+'kg', x, y-9);
    // Date
    ctx.fillStyle = '#8B949E'; ctx.font = '9px sans-serif';
    ctx.fillText(p.date, x, 200-padB+14);
  });

  // Stats
  const first = values[0], last = values[values.length-1];
  const diff = last - first;
  const diffStr = diff >= 0 ? `+${diff}kg 📈` : `${diff}kg 📉`;
  const maxEver = Math.max(...values);
  statsEl.innerHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;flex:1;text-align:center">
        <div style="font-size:18px;font-weight:800;color:var(--green)">${maxEver}kg</div>
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase">Máximo</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;flex:1;text-align:center">
        <div style="font-size:18px;font-weight:800;color:var(--accent)">${last}kg</div>
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase">Último</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;flex:1;text-align:center">
        <div style="font-size:18px;font-weight:800;color:${diff>=0?'var(--green)':'var(--red)'}">${diffStr}</div>
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase">Evolução</div>
      </div>
    </div>`;
}

// ══════════════════════════════════
// TAB NAVIGATION
// ══════════════════════════════════
function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
  if (id === 'historico') renderHistory();
  if (id === 'evolucao') { populateChartSelect(); renderChart(); }
}

// ══════════════════════════════════
// BOOT
// ══════════════════════════════════
init();
</script>
